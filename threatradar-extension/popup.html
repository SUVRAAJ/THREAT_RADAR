<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: monospace;
      width: 480px;
      min-height: 200px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #1a1a1a;
    }
    .logo {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .logo span { color: #ff3c3c; }
    .version { font-size: 10px; color: #333; letter-spacing: 0.1em; }
    .content { padding: 20px; }
    .input-row {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
    }
    input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-right: none;
      color: #fff;
      font-size: 13px;
      padding: 10px 14px;
      font-family: monospace;
      outline: none;
    }
    button {
      background: #ff3c3c;
      color: #fff;
      border: none;
      padding: 10px 16px;
      font-size: 12px;
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    button:disabled { background: #333; cursor: not-allowed; }
    .status {
      font-size: 12px;
      color: #444;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 24px 0;
    }
    .result { animation: fadeUp 0.3s ease forwards; }
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #1a1a1a;
    }
    .target {
      font-size: 18px;
      font-weight: 500;
      color: #fff;
      word-break: break-all;
    }
    .badge {
      font-size: 10px;
      padding: 3px 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      margin-left: 12px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #111;
      font-size: 12px;
    }
    .score-label { color: #555; }
    .score-val { color: #fff; font-family: monospace; }
    .bar-wrap { margin: 4px 0 8px; }
    .bar-track { height: 2px; background: #1a1a1a; }
    .bar-fill { height: 2px; transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #111;
      font-size: 11px;
    }
    .info-key { color: #444; }
    .info-val { color: #888; font-family: monospace; }
    .open-btn {
      width: 100%;
      margin-top: 16px;
      background: none;
      border: 1px solid #333;
      color: #555;
      padding: 8px;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .error {
      background: #ff3c3c11;
      border: 1px solid #ff3c3c33;
      color: #ff3c3c;
      padding: 12px 16px;
      font-size: 12px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Threat<span>Radar</span></div>
    <div class="version">v1.0</div>
  </div>
  <div class="content">
    <div class="input-row">
      <input type="text" id="targetInput" placeholder="IP, domain, or URL..." />
      <button id="scanBtn">Scan →</button>
    </div>
    <div id="statusEl" class="status">Enter a target or right-click any link</div>
    <div id="resultEl" style="display:none"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
